<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="geometricPrecision">
  <!-- background tile so the burger reads on light AND dark browser chromes -->
  <rect width="32" height="32" rx="6" fill="#0A0A0A" />

  <!-- top bun -->
  <path d="M5 12 Q16 4, 27 12 L27 14 L5 14 Z" fill="#E5A85A" stroke="#0A0A0A" stroke-width="1.2" stroke-linejoin="round"/>
  <ellipse cx="11" cy="9.5" rx="0.9" ry="0.5" fill="#FFF8E7"/>
  <ellipse cx="16" cy="8" rx="0.9" ry="0.5" fill="#FFF8E7"/>
  <ellipse cx="21" cy="9.5" rx="0.9" ry="0.5" fill="#FFF8E7"/>

  <!-- lettuce ruffle -->
  <path d="M4 15 Q7 13.5 10 15 T16 15 T22 15 T28 15 L28 17 L4 17 Z" fill="#7DA640" stroke="#0A0A0A" stroke-width="1" stroke-linejoin="round"/>

  <!-- patty -->
  <rect x="5" y="17" width="22" height="3.5" fill="#5A2E0F" stroke="#0A0A0A" stroke-width="1"/>

  <!-- melted cheese with drip -->
  <path d="M5 20 L27 20 L27 21.5 Q23 23 19 21.5 T11 22 T5 21.5 Z" fill="#F4C320" stroke="#0A0A0A" stroke-width="1" stroke-linejoin="round"/>

  <!-- bottom bun -->
  <path d="M5 22 L27 22 Q27 28 16 29 Q5 28 5 22 Z" fill="#D4924A" stroke="#0A0A0A" stroke-width="1.2" stroke-linejoin="round"/>
</svg>
